<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Вибір дат оренди</title>
  <style>
    :root {
      --bg:          var(--tg-theme-bg-color,            #ffffff);
      --bg2:         var(--tg-theme-secondary-bg-color,  #f1f1f1);
      --text:        var(--tg-theme-text-color,           #000000);
      --hint:        var(--tg-theme-hint-color,           #999999);
      --accent:      var(--tg-theme-button-color,         #2481cc);
      --accent-text: var(--tg-theme-button-text-color,    #ffffff);
      --booked-bg:   rgba(220, 60, 60, 0.13);
      --booked-dot:  #d93030;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      padding-bottom: 88px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .mode-badge {
      font-size: 12px; font-weight: 500;
      color: var(--accent);
      background: rgba(36, 129, 204, 0.12);
      padding: 3px 10px; border-radius: 10px;
    }

    /* ── Step pills ── */
    .steps {
      display: flex;
      margin: 0 16px 14px;
      background: var(--bg2);
      border-radius: 12px;
      padding: 3px; gap: 3px;
    }
    .step-pill {
      flex: 1; padding: 8px 4px;
      border-radius: 10px; border: none;
      background: transparent; color: var(--hint);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .step-pill.active {
      background: var(--bg); color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.10);
    }
    .step-pill.done { color: var(--accent); }

    /* ── Calendar ── */
    .cal-wrap { padding: 0 16px; }

    .month-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .nav-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--accent); font-size: 22px;
      border-radius: 50%; cursor: pointer;
    }
    .nav-btn:active { background: var(--bg2); }
    .month-title { font-weight: 600; font-size: 15px; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px; text-align: center;
    }
    .cal-dow {
      font-size: 11px; font-weight: 600;
      color: var(--hint);
      padding: 2px 0 7px;
      text-transform: uppercase;
    }
    .cal-cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-radius: 50%;
      cursor: pointer; position: relative;
      transition: background .12s;
      user-select: none;
    }
    .cal-cell:active { transform: scale(.88); }
    .cal-cell.empty    { pointer-events: none; }
    .cal-cell.disabled { color: var(--hint); pointer-events: none; }
    .cal-cell.today    { font-weight: 700; color: var(--accent); }

    /* selection */
    .cal-cell.sel-start,
    .cal-cell.sel-end {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 600;
    }
    .cal-cell.in-range   { background: var(--bg2); border-radius: 0; }
    .cal-cell.range-left  { border-radius: 50% 0 0 50%; }
    .cal-cell.range-right { border-radius: 0 50% 50% 0; }
    .cal-cell.sel-start.sel-end { border-radius: 50%; }

    /* ── Booked days ── */
    .cal-cell.booked {
      background: var(--booked-bg);
      color: var(--booked-dot);
      pointer-events: none;   /* blocked — cannot be selected */
      text-decoration: line-through;
      opacity: .7;
    }
    /* booked dot for days that are only partially booked (selectable) */
    .cal-cell.booked-hint::after {
      content: '';
      position: absolute;
      bottom: 3px; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      background: var(--booked-dot);
      border-radius: 50%;
    }

    /* ── Legend ── */
    .legend {
      display: flex; align-items: center; gap: 6px;
      margin: 10px 16px 0;
      font-size: 12px; color: var(--hint);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--booked-bg);
      border: 1px solid var(--booked-dot);
      flex-shrink: 0;
    }

    /* ── Time picker ── */
    .time-block {
      margin: 14px 16px 0; padding: 12px 14px;
      background: var(--bg2); border-radius: 12px;
    }
    .time-block label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--hint); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .time-input {
      width: 100%; background: none; border: none;
      font-size: 24px; font-weight: 500;
      color: var(--text); outline: none;
      cursor: pointer; font-family: inherit;
    }
    .time-input::-webkit-calendar-picker-indicator { filter: invert(50%); cursor: pointer; }

    /* ── Summary card ── */
    .summary {
      margin: 12px 16px 0; padding: 12px 14px;
      background: var(--bg2); border-radius: 12px;
    }
    .sum-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .sum-row + .sum-row {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--bg);
    }
    .sum-lbl { font-size: 12px; color: var(--hint); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    .sum-val { font-size: 14px; font-weight: 500; }
    .sum-val.empty { color: var(--hint); font-weight: 400; font-style: italic; }

    /* price row */
    .sum-price-row { display: none; }
    .sum-price-row.visible { display: flex; }
    .sum-price {
      font-size: 15px; font-weight: 700;
      color: var(--accent);
    }
    .sum-price-detail {
      font-size: 12px; color: var(--hint);
      margin-top: 1px;
    }

    /* overlap warning row */
    .overlap-warn {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--bg);
      font-size: 12px; color: var(--booked-dot);
      display: none;
    }
    .overlap-warn.visible { display: block; }

    /* ── Confirm button ── */
    .confirm-btn {
      position: fixed;
      bottom: 16px; left: 16px; right: 16px;
      background: var(--accent); color: var(--accent-text);
      border: none; border-radius: 13px;
      padding: 15px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
      font-family: inherit;
    }
    .confirm-btn:disabled { opacity: .38; cursor: default; }
    .confirm-btn:not(:disabled):active { opacity: .82; }
  </style>
</head>
<body>

<div class="header">
  <h1>📅 Вибір дат</h1>
  <span class="mode-badge" id="modeBadge">–</span>
</div>

<div class="steps">
  <button class="step-pill active" id="pillStart" onclick="goStep('start')">📌 Початок</button>
  <button class="step-pill"        id="pillEnd"   onclick="goStep('end')">🏁 Кінець</button>
</div>

<div class="cal-wrap">
  <div class="month-nav">
    <button class="nav-btn" onclick="shiftMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" onclick="shiftMonth(+1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="legend" id="legend" style="display:none">
  <div class="legend-dot"></div>
  <span>— заброньовано, недоступно</span>
</div>

<div class="time-block">
  <label id="timeLbl">⏰ Час початку (UTC)</label>
  <input type="time" class="time-input" id="timeInput" value="09:00" onchange="onTime()">
</div>

<div class="summary">
  <div class="sum-row">
    <span class="sum-lbl">Початок</span>
    <span class="sum-val empty" id="sumStart">не вибрано</span>
  </div>
  <div class="sum-row">
    <span class="sum-lbl">Кінець</span>
    <span class="sum-val empty" id="sumEnd">не вибрано</span>
  </div>
  <div class="sum-row sum-price-row" id="priceRow">
    <div>
      <span class="sum-lbl">Орієнтовна вартість</span>
      <div class="sum-price-detail" id="priceDetail"></div>
    </div>
    <span class="sum-price" id="sumPrice"></span>
  </div>
  <div class="overlap-warn" id="overlapWarn">
    ⚠️ Обраний період перетинається із заброньованим часом
  </div>
</div>

<button class="confirm-btn" id="confirmBtn" disabled onclick="submit()">
  Оберіть дату початку
</button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  /* ── URL params ── */
  const qp        = new URLSearchParams(location.search);
  const MODE      = qp.get('mode') || 'hour';
  const TOOL_ID   = qp.get('tool_id') || null;
  const PRICE_H   = qp.get('ph')  !== null ? parseFloat(qp.get('ph'))  : null;
  const PRICE_D   = qp.get('pd')  !== null ? parseFloat(qp.get('pd'))  : null;

  document.getElementById('modeBadge').textContent =
    MODE === 'day' ? 'Подобова' : 'Погодинна';

  /* ── Booked periods (from bot, UTC) ── */
  const BOOKED = (() => {
    try {
      const raw = qp.get('booked');
      if (!raw) return [];
      return JSON.parse(decodeURIComponent(raw)).map(b => ({
        s: new Date(b.s + ':00Z'),
        e: new Date(b.e + ':00Z'),
      }));
    } catch { return []; }
  })();

  if (BOOKED.length) document.getElementById('legend').style.display = 'flex';

  /* ── State ── */
  const TODAY = new Date(); TODAY.setHours(0,0,0,0);
  let calYear  = TODAY.getFullYear();
  let calMonth = TODAY.getMonth();
  let step      = 'start';
  let startDate = null, startTime = '09:00';
  let endDate   = null, endTime   = '18:00';

  /* ── i18n ── */
  const MONTHS = [
    'Січень','Лютий','Березень','Квітень','Травень','Червень',
    'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень',
  ];
  const MONTHS_GEN = [
    'Січ','Лют','Бер','Квіт','Трав','Черв',
    'Лип','Серп','Вер','Жовт','Лист','Груд',
  ];
  const DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

  /* ── Booking helpers ── */
  function dayOverlapsBooking(d) {
    // does any booking touch this calendar day?
    const dayStart = new Date(d); dayStart.setHours(0,  0,  0,   0);
    const dayEnd   = new Date(d); dayEnd.setHours(23, 59, 59, 999);
    return BOOKED.some(b => b.s < dayEnd && b.e > dayStart);
  }

  function rangeOverlapsBooking(sd, st, ed, et) {
    if (!sd || !ed) return false;
    const s = new Date(dateISO(sd, st) + 'Z');
    const e = new Date(dateISO(ed, et) + 'Z');
    return BOOKED.some(b => b.s < e && b.e > s);
  }

  /* ── Generic helpers ── */
  function sameDay(a, b) {
    return a && b &&
      a.getFullYear()===b.getFullYear() &&
      a.getMonth()===b.getMonth() &&
      a.getDate()===b.getDate();
  }

  function dateISO(d, t) {
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    return `${d.getFullYear()}-${mm}-${dd}T${t}`;
  }

  function fmtDisplay(d, t) {
    const dd = String(d.getDate()).padStart(2,'0');
    return `${dd} ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}, ${t} UTC`;
  }

  function isBefore(d, ref) {
    const a = new Date(d); a.setHours(0,0,0,0);
    const b = new Date(ref); b.setHours(0,0,0,0);
    return a < b;
  }

  function inSelRange(d) {
    if (!startDate || !endDate) return false;
    const x = new Date(d); x.setHours(12);
    const s = new Date(startDate); s.setHours(0);
    const e = new Date(endDate); e.setHours(23);
    return x > s && x < e;
  }

  /* ── Render calendar ── */
  function renderCal() {
    document.getElementById('monthTitle').textContent =
      `${MONTHS[calMonth]} ${calYear}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    DOW.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const offset   = (firstDow + 6) % 7;
    const days     = new Date(calYear, calMonth+1, 0).getDate();

    for (let i = 0; i < offset; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      grid.appendChild(el);
    }

    for (let day = 1; day <= days; day++) {
      const d  = new Date(calYear, calMonth, day);
      const el = document.createElement('div');
      el.className = 'cal-cell';
      el.textContent = day;

      const past      = isBefore(d, TODAY);
      const tooEarly  = step === 'end' && startDate && (
        MODE === 'day'
          ? (isBefore(d, startDate) || sameDay(d, startDate))
          : isBefore(d, startDate)
      );
      const isBooked  = dayOverlapsBooking(d);

      if (past || tooEarly) {
        el.classList.add('disabled');
      } else if (isBooked) {
        // blocked: visually crossed-out, not selectable
        el.classList.add('booked');
      } else {
        const isSelS = sameDay(d, startDate);
        const isSelE = sameDay(d, endDate);
        const isRng  = inSelRange(d);
        const isTod  = sameDay(d, TODAY);

        if (isSelS && isSelE) {
          el.classList.add('sel-start', 'sel-end');
        } else if (isSelS) {
          el.classList.add('sel-start');
          if (endDate) el.classList.add('range-left');
        } else if (isSelE) {
          el.classList.add('sel-end');
          if (startDate) el.classList.add('range-right');
        } else if (isRng) {
          el.classList.add('in-range');
        } else if (isTod) {
          el.classList.add('today');
        }

        el.addEventListener('click', () => pickDay(d));
      }

      grid.appendChild(el);
    }
  }

  /* ── Interactions ── */
  function pickDay(d) {
    if (step === 'start') {
      startDate = new Date(d);
      endDate = null; // reset end when start changes
      setTimeout(() => goStep('end'), 180);
    } else {
      endDate = new Date(d);
    }
    renderCal();
    renderSummary();
    updateBtn();
  }

  function goStep(s) {
    step = s;
    const ps = document.getElementById('pillStart');
    const pe = document.getElementById('pillEnd');
    ps.className = 'step-pill' + (s==='start' ? ' active' : startDate ? ' done' : '');
    pe.className = 'step-pill' + (s==='end'   ? ' active' : endDate   ? ' done' : '');

    const inp = document.getElementById('timeInput');
    const lbl = document.getElementById('timeLbl');
    if (s === 'start') {
      inp.value = startTime;
      lbl.textContent = '⏰ Час початку (UTC)';
    } else {
      inp.value = endTime;
      lbl.textContent = '⏰ Час завершення (UTC)';
    }

    renderCal();
  }

  function shiftMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth <  0) { calMonth = 11; calYear--; }
    renderCal();
  }

  function onTime() {
    const v = document.getElementById('timeInput').value;
    if (step === 'start') startTime = v;
    else endTime = v;
    renderSummary();
    updateBtn();
  }

  function renderSummary() {
    const ss = document.getElementById('sumStart');
    const se = document.getElementById('sumEnd');
    const ow = document.getElementById('overlapWarn');

    ss.textContent = startDate ? fmtDisplay(startDate, startTime) : 'не вибрано';
    ss.className   = 'sum-val' + (startDate ? '' : ' empty');

    se.textContent = endDate ? fmtDisplay(endDate, endTime) : 'не вибрано';
    se.className   = 'sum-val' + (endDate ? '' : ' empty');

    const hasOverlap = BOOKED.length > 0 &&
      rangeOverlapsBooking(startDate, startTime, endDate, endTime);
    ow.className = 'overlap-warn' + (hasOverlap ? ' visible' : '');

    const price = calcPrice();
    const priceRow = document.getElementById('priceRow');
    if (price) {
      document.getElementById('sumPrice').textContent =
        `${price.total.toFixed(2)}₴`;
      document.getElementById('priceDetail').textContent =
        `${price.units} ${price.label} × ${price.rate.toFixed(2)}₴`;
      priceRow.className = 'sum-row sum-price-row visible';
    } else {
      priceRow.className = 'sum-row sum-price-row';
    }
  }

  /* ── Price calculation ── */
  function calcPrice() {
    if (!startDate || !endDate) return null;
    const s = new Date(dateISO(startDate, startTime) + 'Z');
    const e = new Date(dateISO(endDate,   endTime)   + 'Z');
    if (e <= s) return null;
    const diffMs = e - s;
    if (MODE === 'hour' && PRICE_H !== null) {
      const units = Math.max(1, Math.ceil(diffMs / 3_600_000));
      return { total: Math.round(PRICE_H * units * 100) / 100, units, label: 'год', rate: PRICE_H };
    }
    if (MODE === 'day' && PRICE_D !== null) {
      const units = Math.max(1, Math.ceil(diffMs / 86_400_000));
      return { total: Math.round(PRICE_D * units * 100) / 100, units, label: 'дн', rate: PRICE_D };
    }
    return null;
  }

  function isValid() {
    if (!startDate || !endDate) return false;
    const s = new Date(dateISO(startDate, startTime) + 'Z');
    const e = new Date(dateISO(endDate,   endTime)   + 'Z');
    if (s <= new Date()) return false;
    if (e <= s) return false;
    if (MODE === 'hour' && (e - s) < 3_600_000) return false;
    if (MODE === 'day'  && (sameDay(endDate, startDate) || isBefore(endDate, startDate))) return false;
    if (rangeOverlapsBooking(startDate, startTime, endDate, endTime)) return false;
    return true;
  }

  function updateBtn() {
    const btn = document.getElementById('confirmBtn');
    if (!startDate) {
      btn.textContent = 'Оберіть дату початку'; btn.disabled = true; return;
    }
    if (!endDate) {
      btn.textContent = 'Оберіть дату завершення'; btn.disabled = true; return;
    }
    const s = new Date(dateISO(startDate, startTime) + 'Z');
    const e = new Date(dateISO(endDate,   endTime)   + 'Z');
    if (s <= new Date()) {
      btn.textContent = 'Початок у минулому ⚠️'; btn.disabled = true;
    } else if (e <= s) {
      btn.textContent = 'Кінець раніше початку ⚠️'; btn.disabled = true;
    } else if (MODE === 'hour' && (e - s) < 3_600_000) {
      btn.textContent = 'Мінімум 1 година ⚠️'; btn.disabled = true;
    } else if (MODE === 'day' && (sameDay(endDate, startDate) || isBefore(endDate, startDate))) {
      btn.textContent = 'Мінімум 1 день ⚠️'; btn.disabled = true;
    } else if (rangeOverlapsBooking(startDate, startTime, endDate, endTime)) {
      btn.textContent = 'Перетин з бронюванням ⚠️'; btn.disabled = true;
    } else {
      btn.textContent = 'Підтвердити →'; btn.disabled = false;
    }
  }

  function submit() {
    if (!isValid()) return;
    const payload = {
      start_at: dateISO(startDate, startTime),
      end_at:   dateISO(endDate,   endTime),
      unit:     MODE,
      tool_id:  TOOL_ID ? parseInt(TOOL_ID) : null,
    };
    if (tg) {
      tg.sendData(JSON.stringify(payload));
    } else {
      alert('Payload:\n' + JSON.stringify(payload, null, 2));
    }
  }

  /* ── Init ── */
  goStep('start');
  renderSummary();
  updateBtn();
</script>
</body>
</html>
