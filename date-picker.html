<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Вибір дат оренди</title>
  <style>
    :root {
      --bg:          var(--tg-theme-bg-color,            #ffffff);
      --bg2:         var(--tg-theme-secondary-bg-color,  #f1f1f1);
      --text:        var(--tg-theme-text-color,           #000000);
      --hint:        var(--tg-theme-hint-color,           #999999);
      --accent:      var(--tg-theme-button-color,         #2481cc);
      --accent-text: var(--tg-theme-button-text-color,    #ffffff);
      --booked-bg:   rgba(220, 60, 60, 0.13);
      --booked-dot:  #d93030;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      padding-bottom: 88px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 10px;
    }
    .header h1 { font-size: 17px; font-weight: 600; }
    .mode-badge {
      font-size: 12px; font-weight: 500;
      color: var(--accent);
      background: rgba(36, 129, 204, 0.12);
      padding: 3px 10px; border-radius: 10px;
    }

    /* ── Step pills ── */
    .steps {
      display: flex;
      margin: 0 16px 14px;
      background: var(--bg2);
      border-radius: 12px;
      padding: 3px; gap: 3px;
    }
    .step-pill {
      flex: 1; padding: 8px 4px;
      border-radius: 10px; border: none;
      background: transparent; color: var(--hint);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .step-pill.active {
      background: var(--bg); color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.10);
    }
    .step-pill.done { color: var(--accent); }
    .step-pill:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Calendar ── */
    .cal-wrap { padding: 0 16px; }

    .month-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .nav-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--accent); font-size: 22px;
      border-radius: 50%; cursor: pointer;
    }
    .nav-btn:active { background: var(--bg2); }
    .month-title { font-weight: 600; font-size: 15px; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px; text-align: center;
    }
    .cal-dow {
      font-size: 11px; font-weight: 600;
      color: var(--hint);
      padding: 2px 0 7px;
      text-transform: uppercase;
    }
    .cal-cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-radius: 50%;
      cursor: pointer; position: relative;
      transition: background .12s;
      user-select: none;
    }
    .cal-cell:active { transform: scale(.88); }
    .cal-cell.empty    { pointer-events: none; }
    .cal-cell.disabled { color: var(--hint); pointer-events: none; }
    .cal-cell.today    { font-weight: 700; color: var(--accent); }

    /* selection */
    .cal-cell.sel-start,
    .cal-cell.sel-end {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 600;
    }
    .cal-cell.in-range   { background: var(--bg2); border-radius: 0; }
    .cal-cell.range-left  { border-radius: 50% 0 0 50%; }
    .cal-cell.range-right { border-radius: 0 50% 50% 0; }
    .cal-cell.sel-start.sel-end { border-radius: 50%; }

    /* ── Booked days ── */
    .cal-cell.booked {
      background: var(--booked-bg);
      color: var(--booked-dot);
      pointer-events: none;   /* blocked — cannot be selected */
      text-decoration: line-through;
      opacity: .7;
    }
    /* partially booked: clickable, no strikethrough — clearly selectable */
    .cal-cell.booked-hint {
      background: rgba(255, 160, 0, 0.13);
      color: var(--text);
      font-weight: 500;
    }
    .cal-cell.booked-hint:active { background: rgba(255, 160, 0, 0.28); }
    /* blue accent dot = free slots still available */
    .cal-cell.booked-hint::after {
      content: '';
      position: absolute;
      bottom: 2px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px;
      background: var(--accent);
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }

    /* ── Legend ── */
    .legend {
      display: flex; align-items: center; gap: 6px;
      margin: 10px 16px 0;
      font-size: 12px; color: var(--hint);
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--booked-bg);
      border: 1px solid var(--booked-dot);
      flex-shrink: 0;
    }
    .legend-dot-partial {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      border: 1.5px solid rgba(255,160,0,0.13);
    }

    /* ── Time picker ── */
    .time-block {
      margin: 14px 16px 0; padding: 12px 14px;
      background: var(--bg2); border-radius: 12px;
    }
    .time-block label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--hint); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .time-input {
      width: 100%; background: none; border: none;
      font-size: 24px; font-weight: 500;
      color: var(--text); outline: none;
      cursor: pointer; font-family: inherit;
    }
    .time-input::-webkit-calendar-picker-indicator { filter: invert(50%); cursor: pointer; }

    .blocked-hours-info {
      margin-top: 8px;
      font-size: 12px;
      color: var(--booked-dot);
      background: var(--booked-bg);
      border-radius: 8px;
      padding: 6px 8px;
      line-height: 1.4;
      display: none;
    }
    .blocked-hours-info.conflict {
      background: rgba(220, 60, 60, 0.28);
      border: 1px solid var(--booked-dot);
      font-weight: 600;
    }

    /* ── Summary card ── */
    .summary {
      margin: 12px 16px 0; padding: 12px 14px;
      background: var(--bg2); border-radius: 12px;
    }
    .sum-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .sum-row + .sum-row {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--bg);
    }
    .sum-lbl { font-size: 12px; color: var(--hint); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    .sum-val { font-size: 14px; font-weight: 500; }
    .sum-val.empty { color: var(--hint); font-weight: 400; font-style: italic; }

    /* price row */
    .sum-price-row { display: none; }
    .sum-price-row.visible { display: flex; }
    .sum-price {
      font-size: 15px; font-weight: 700;
      color: var(--accent);
    }
    .sum-price-detail {
      font-size: 12px; color: var(--hint);
      margin-top: 1px;
    }

    /* overlap warning row */
    .overlap-warn {
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--bg);
      font-size: 12px; color: var(--booked-dot);
      display: none;
    }
    .overlap-warn.visible { display: block; }

    /* ── Confirm button ── */
    .confirm-btn {
      position: fixed;
      bottom: 16px; left: 16px; right: 16px;
      background: var(--accent); color: var(--accent-text);
      border: none; border-radius: 13px;
      padding: 15px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
      font-family: inherit;
    }
    .confirm-btn:disabled { opacity: .38; cursor: default; }
    .confirm-btn:not(:disabled):active { opacity: .82; }
  </style>
</head>
<body>

<div class="header">
  <h1>📅 Вибір дат</h1>
  <span class="mode-badge" id="modeBadge">–</span>
</div>

<div class="steps">
  <button class="step-pill active" id="pillStart" onclick="goStep('start')">📌 Початок</button>
  <button class="step-pill"        id="pillEnd"   onclick="goStep('end')">🏁 Кінець</button>
</div>

<div class="cal-wrap">
  <div class="month-nav">
    <button class="nav-btn" onclick="shiftMonth(-1)">‹</button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" onclick="shiftMonth(+1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="legend" id="legend" style="display:none">
  <div class="legend-dot"></div>
  <span>— день повністю зайнятий</span>
</div>
<div class="legend" id="legendPartial" style="display:none">
  <div class="legend-dot-partial"></div>
  <span>— є вільні години, натисніть щоб обрати</span>
</div>

<div class="time-block">
  <label id="timeLbl">⏰ Час початку (Київ)</label>
  <input type="time" class="time-input" id="timeInput" value="09:00" oninput="onTime()" onchange="onTime()">
  <div class="blocked-hours-info" id="blockedHoursInfo"></div>
</div>

<div class="summary">
  <div class="sum-row">
    <span class="sum-lbl">Початок</span>
    <span class="sum-val empty" id="sumStart">не вибрано</span>
  </div>
  <div class="sum-row">
    <span class="sum-lbl">Кінець</span>
    <span class="sum-val empty" id="sumEnd">не вибрано</span>
  </div>
  <div class="sum-row sum-price-row" id="priceRow">
    <div>
      <span class="sum-lbl">Орієнтовна вартість</span>
      <div class="sum-price-detail" id="priceDetail"></div>
    </div>
    <span class="sum-price" id="sumPrice"></span>
  </div>
  <div class="overlap-warn" id="overlapWarn">
    ⚠️ Обраний період перетинається із заброньованим часом
  </div>
</div>

<button class="confirm-btn" id="confirmBtn" disabled onclick="submit()">
  Оберіть дату початку
</button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  /* ── URL params ── */
  const qp      = new URLSearchParams(location.search);
  const MODE    = qp.get('mode') || 'hour';
  const TOOL_ID = qp.get('tool_id') || null;
  const PRICE_H = (() => { const v = parseFloat(qp.get('ph')); return isNaN(v) ? null : v; })();
  const PRICE_D = (() => { const v = parseFloat(qp.get('pd')); return isNaN(v) ? null : v; })();

  document.getElementById('modeBadge').textContent = MODE === 'day' ? 'Подобова' : 'Погодинна';

  /* ── Booked periods ── */
  const BOOKED = (() => {
    try {
      const raw = qp.get('booked');
      if (!raw) return [];
      return JSON.parse(decodeURIComponent(raw)).map(b => ({
        s: new Date(b.s + ':00Z'),
        e: new Date(b.e + ':00Z'),
      }));
    } catch { return []; }
  })();

  // 1-hour return buffer added to every booking end
  const BOOKED_BUFFERED = BOOKED.map(b => ({ s: b.s, e: new Date(b.e.getTime() + 3_600_000) }));

  if (BOOKED.length) {
    document.getElementById('legend').style.display = 'flex';
    document.getElementById('legendPartial').style.display = 'flex';
  }

  /* ── State ── */
  const TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
  let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();
  let step = 'start';
  let startDate = null, startTime = '09:00';
  let endDate   = null, endTime   = '18:00';

  const MONTHS     = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
  const MONTHS_GEN = ['Січ','Лют','Бер','Квіт','Трав','Черв','Лип','Серп','Вер','Жовт','Лист','Груд'];
  const DOW        = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

  /* ── Kyiv timezone helpers ── */
  function _kyivOffset(d) {
    const ls = (yr, mo) => { const x = new Date(yr, mo, 31); x.setDate(31 - x.getDay()); return x; };
    return (d >= ls(d.getFullYear(), 2) && d < ls(d.getFullYear(), 9)) ? 3 : 2;
  }

  function uaLocalToUTC(d, t) {
    const [hh, mm] = t.split(':').map(Number);
    try {
      const probe  = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate(), hh, mm));
      const repr   = new Date(probe.toLocaleString('en-US', { timeZone: 'Europe/Kiev' }));
      const target = new Date(d.getFullYear(), d.getMonth(), d.getDate(), hh, mm);
      const result = new Date(probe.getTime() + target.getTime() - repr.getTime());
      if (!isNaN(result.getTime())) return result;
    } catch (_) {}
    return new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate(), hh - _kyivOffset(d), mm));
  }

  function kyivHHMM(utcDate) {
    try {
      const s = new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/Kiev', hour: '2-digit', minute: '2-digit', hour12: false }).format(utcDate);
      if (/^\d{2}:\d{2}/.test(s)) return s.slice(0, 5);
    } catch (_) {}
    const off = _kyivOffset(new Date(utcDate.getFullYear(), utcDate.getMonth(), utcDate.getDate()));
    const loc = new Date(utcDate.getTime() + off * 3600000);
    return String(loc.getUTCHours()).padStart(2, '0') + ':' + String(loc.getUTCMinutes()).padStart(2, '0');
  }

  function kyivDDMM(utcDate) {
    const off = _kyivOffset(new Date(utcDate.getFullYear(), utcDate.getMonth(), utcDate.getDate()));
    const loc = new Date(utcDate.getTime() + off * 3600000);
    return String(loc.getUTCDate()).padStart(2, '0') + '.' + String(loc.getUTCMonth() + 1).padStart(2, '0');
  }

  /* ── Generic helpers ── */
  function sameDay(a, b) {
    return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }
  function isBefore(d, ref) {
    const a = new Date(d); a.setHours(0, 0, 0, 0);
    const b = new Date(ref); b.setHours(0, 0, 0, 0);
    return a < b;
  }
  function dateISO(d, t) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${t}`;
  }
  function fmtDisplay(d, t) {
    return `${String(d.getDate()).padStart(2,'0')} ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}, ${t} (Київ)`;
  }
  function inSelRange(d) {
    if (!startDate || !endDate) return false;
    const x = new Date(d); x.setHours(12);
    const s = new Date(startDate); s.setHours(0);
    const e = new Date(endDate); e.setHours(23);
    return x > s && x < e;
  }

  /* ── Booking helpers ── */
  function _dayBounds(d) {
    const next = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
    return { dayStart: uaLocalToUTC(d, '00:00'), dayEnd: uaLocalToUTC(next, '00:00') };
  }

  function _mergeIntervals(pairs) {
    const sorted = [...pairs].sort((a, b) => a[0] - b[0]);
    const out = [];
    for (const [s, e] of sorted) {
      if (!out.length || s > out[out.length - 1][1]) out.push([s, e]);
      else out[out.length - 1][1] = Math.max(out[out.length - 1][1], e);
    }
    return out;
  }

  function getDayBookingStatus(d) {
    const { dayStart, dayEnd } = _dayBounds(d);

    if (MODE === 'day') {
      // Only starts in [08:00, 20:00] are valid; rental is 24 h → scan [08:00 D, 20:00 D+1]
      const winStart     = uaLocalToUTC(d, '08:00');
      const latestStart  = uaLocalToUTC(d, '20:00');
      const winEnd       = new Date(latestStart.getTime() + 86_400_000);
      const overlapping  = BOOKED_BUFFERED.filter(b => b.s < winEnd && b.e > winStart);
      if (!overlapping.length) return 'free';
      const merged = _mergeIntervals(
        overlapping.map(b => [Math.max(b.s.getTime(), winStart.getTime()), Math.min(b.e.getTime(), winEnd.getTime())])
      );
      const latestStartMs = latestStart.getTime();
      let cursor = winStart.getTime();
      for (const [s, e] of merged) {
        if (cursor <= latestStartMs && s - cursor >= 86_400_000) return 'partial';
        cursor = Math.max(cursor, e);
      }
      if (cursor <= latestStartMs && winEnd.getTime() - cursor >= 86_400_000) return 'partial';
      return 'full';
    }

    // Hourly mode: longest contiguous free slot within the day ≥ 2 h
    const overlapping = BOOKED_BUFFERED.filter(b => b.s < dayEnd && b.e > dayStart);
    if (!overlapping.length) return 'free';
    const merged = _mergeIntervals(
      overlapping.map(b => [Math.max(b.s.getTime(), dayStart.getTime()), Math.min(b.e.getTime(), dayEnd.getTime())])
    );
    let maxFreeMs = 0, cursor = dayStart.getTime();
    for (const [s, e] of merged) {
      if (s > cursor) maxFreeMs = Math.max(maxFreeMs, s - cursor);
      cursor = Math.max(cursor, e);
    }
    maxFreeMs = Math.max(maxFreeMs, dayEnd.getTime() - cursor);
    return maxFreeMs < 2 * 3_600_000 ? 'full' : 'partial';
  }

  function getBookedIntervalsForDay(d) {
    const { dayStart, dayEnd } = _dayBounds(d);
    const overlapping = BOOKED_BUFFERED.filter(b => b.s < dayEnd && b.e > dayStart);
    if (!overlapping.length) return [];
    return _mergeIntervals(
      overlapping.map(b => [Math.max(b.s.getTime(), dayStart.getTime()), Math.min(b.e.getTime(), dayEnd.getTime())])
    ).map(([s, e]) => ({ start: kyivHHMM(new Date(s)), end: kyivHHMM(new Date(e)) }));
  }

  function showBlockedHours(d) {
    const el = document.getElementById('blockedHoursInfo');
    el.classList.remove('conflict');
    if (!d || !BOOKED_BUFFERED.length) { el.style.display = 'none'; return; }
    const ivs = getBookedIntervalsForDay(d);
    if (!ivs.length) { el.style.display = 'none'; return; }
    el.textContent = `⛔ Зайнятий час (${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}): ` + ivs.map(iv => `${iv.start}–${iv.end}`).join(', ');
    el.style.display = 'block';
  }

  function rangeOverlapsBooking(sd, st, ed, et) {
    if (!sd || !ed) return false;
    const s = uaLocalToUTC(sd, st), e = uaLocalToUTC(ed, et);
    return BOOKED_BUFFERED.some(b => b.s < e && b.e > s);
  }

  /* ── Render calendar ── */
  function renderCal() {
    document.getElementById('monthTitle').textContent = `${MONTHS[calMonth]} ${calYear}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    DOW.forEach(label => {
      const el = document.createElement('div');
      el.className = 'cal-dow'; el.textContent = label; grid.appendChild(el);
    });
    const offset = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
    const days   = new Date(calYear, calMonth + 1, 0).getDate();
    for (let i = 0; i < offset; i++) {
      const el = document.createElement('div'); el.className = 'cal-cell empty'; grid.appendChild(el);
    }
    for (let day = 1; day <= days; day++) {
      const d = new Date(calYear, calMonth, day);
      const el = document.createElement('div');
      el.className = 'cal-cell';
      el.textContent = day;
      const past      = isBefore(d, TODAY) ||
                        (MODE === 'day' && sameDay(d, TODAY) && kyivHHMM(new Date()) >= '20:00');
      const tooEarly  = step === 'end' && startDate && (MODE === 'day' ? (isBefore(d, startDate) || sameDay(d, startDate)) : isBefore(d, startDate));
      const bookSt    = getDayBookingStatus(d);
      if (past || tooEarly) {
        el.classList.add('disabled');
      } else if (bookSt === 'full') {
        el.classList.add('booked');
      } else {
        const isSelS = sameDay(d, startDate), isSelE = sameDay(d, endDate);
        if      (isSelS && isSelE) el.classList.add('sel-start', 'sel-end');
        else if (isSelS)           { el.classList.add('sel-start'); if (endDate) el.classList.add('range-left'); }
        else if (isSelE)           { el.classList.add('sel-end');   if (startDate) el.classList.add('range-right'); }
        else if (inSelRange(d))    el.classList.add('in-range');
        else if (sameDay(d, TODAY)) el.classList.add('today');
        else if (bookSt === 'partial') el.classList.add('booked-hint');
        el.addEventListener('click', () => pickDay(d));
      }
      grid.appendChild(el);
    }
  }

  /* ── Interactions ── */
  function pickDay(d) {
    if (step === 'start') {
      startDate = new Date(d);
      endDate = null;
      // For day mode: if user picks today, auto-advance startTime past now
      if (MODE === 'day' && sameDay(startDate, TODAY)) {
        const nowKyiv = kyivHHMM(new Date());
        const [h] = nowKyiv.split(':').map(Number);
        const nextH = Math.min(Math.max(h + 1, 8), 20);
        startTime = String(nextH).padStart(2, '0') + ':00';
        document.getElementById('timeInput').value = startTime;
      }
      showBlockedHours(startDate);
      setTimeout(() => goStep('end'), 180);
    } else {
      endDate = new Date(d);
      if (MODE === 'day') endTime = startTime;
      showBlockedHours(endDate);
    }
    renderCal();
    renderSummary();
    updateBtn();
  }

  function goStep(s) {
    if (s === 'end' && !startDate) return;
    step = s;
    document.getElementById('pillStart').className = 'step-pill' + (s === 'start' ? ' active' : startDate ? ' done' : '');
    document.getElementById('pillEnd').className   = 'step-pill' + (s === 'end'   ? ' active' : endDate   ? ' done' : '');
    const inp = document.getElementById('timeInput');
    if (MODE === 'day' && s === 'end') {
      endTime = startTime;
      inp.value = startTime;
      inp.disabled = true;
      document.getElementById('timeLbl').textContent = '⏰ Час (дорівнює початку, крок 24 год)';
    } else {
      inp.value = s === 'start' ? startTime : endTime;
      inp.disabled = false;
      if (MODE === 'day' && s === 'start') { inp.min = '08:00'; inp.max = '20:00'; }
      else { inp.min = ''; inp.max = ''; }
      document.getElementById('timeLbl').textContent = s === 'start' ? '⏰ Час початку (Київ)' : '⏰ Час завершення (Київ)';
    }
    showBlockedHours(s === 'start' ? startDate : (endDate || startDate));
    renderCal();
  }

  function shiftMonth(delta) {
    calMonth += delta;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth <  0) { calMonth = 11; calYear--; }
    renderCal();
  }

  function onTime() {
    const inp = document.getElementById('timeInput');
    let v = inp.value;
    if (MODE === 'day' && step === 'start') {
      if (v < '08:00') v = '08:00';
      else if (v > '20:00') v = '20:00';
      inp.value = v;
    }
    if (step === 'start') { startTime = v; if (MODE === 'day') endTime = v; } else endTime = v;
    const activeDate = step === 'start' ? startDate : endDate;
    if (activeDate && BOOKED_BUFFERED.length) {
      const t = uaLocalToUTC(activeDate, v);
      const el = document.getElementById('blockedHoursInfo');
      const ivs = getBookedIntervalsForDay(activeDate);
      if (!isNaN(t.getTime()) && BOOKED_BUFFERED.some(b => b.s <= t && t < b.e)) {
        el.textContent = `⚠️ Цей час зайнятий! (${String(activeDate.getDate()).padStart(2,'0')}.${String(activeDate.getMonth()+1).padStart(2,'0')}): ` + ivs.map(iv => `${iv.start}–${iv.end}`).join(', ');
        el.classList.add('conflict');
        el.style.display = 'block';
      } else {
        showBlockedHours(activeDate);
      }
    }
    renderSummary();
    updateBtn();
  }

  /* ── Price ── */
  function calcPrice() {
    if (!startDate || !endDate) return null;
    const s = uaLocalToUTC(startDate, startTime), e = uaLocalToUTC(endDate, endTime);
    if (e <= s) return null;
    const ms = e - s;
    if (MODE === 'hour' && PRICE_H !== null) {
      const units = Math.max(1, Math.ceil(ms / 3_600_000));
      return { total: Math.round(PRICE_H * units * 100) / 100, units, label: 'год', rate: PRICE_H };
    }
    if (MODE === 'day' && PRICE_D !== null) {
      const units = Math.max(1, Math.ceil(ms / 86_400_000));
      return { total: Math.round(PRICE_D * units * 100) / 100, units, label: 'дн', rate: PRICE_D };
    }
    return null;
  }

  function renderSummary() {
    const ss = document.getElementById('sumStart'), se = document.getElementById('sumEnd'), ow = document.getElementById('overlapWarn');
    ss.textContent = startDate ? fmtDisplay(startDate, startTime) : 'не вибрано';
    ss.className   = 'sum-val' + (startDate ? '' : ' empty');
    se.textContent = endDate ? fmtDisplay(endDate, endTime) : 'не вибрано';
    se.className   = 'sum-val' + (endDate ? '' : ' empty');
    ow.className   = 'overlap-warn' + (BOOKED.length && rangeOverlapsBooking(startDate, startTime, endDate, endTime) ? ' visible' : '');
    const price = calcPrice(), pr = document.getElementById('priceRow');
    if (price && Number.isFinite(price.total)) {
      document.getElementById('sumPrice').textContent   = `${price.total.toFixed(2)}₴`;
      document.getElementById('priceDetail').textContent = `${price.units} ${price.label} × ${price.rate.toFixed(2)}₴`;
      pr.className = 'sum-row sum-price-row visible';
    } else if (startDate) {
      document.getElementById('sumPrice').textContent   = '0₴';
      document.getElementById('priceDetail').textContent = '';
      pr.className = 'sum-row sum-price-row visible';
    } else {
      pr.className = 'sum-row sum-price-row';
    }
  }

  /* ── Validation ── */
  function _startInPast(s) {
    if (MODE === 'day') {
      if (isBefore(startDate, TODAY)) return true;
      if (sameDay(startDate, TODAY)) return s <= new Date();
      return false;
    }
    return s <= new Date();
  }

  function isValid() {
    if (!startDate || !endDate) return false;
    if (MODE === 'day' && (startTime < '08:00' || startTime > '20:00')) return false;
    const s = uaLocalToUTC(startDate, startTime), e = uaLocalToUTC(endDate, endTime);
    if (_startInPast(s)) return false;
    if (e <= s) return false;
    if (MODE === 'hour' && (e - s) < 3_600_000) return false;
    if (MODE === 'day'  && !isBefore(startDate, endDate)) return false;
    if (rangeOverlapsBooking(startDate, startTime, endDate, endTime)) return false;
    return true;
  }

  function updateBtn() {
    const btn = document.getElementById('confirmBtn');
    document.getElementById('pillEnd').disabled = !startDate;
    if (!startDate) { btn.textContent = 'Оберіть дату початку';    btn.disabled = true; return; }
    if (!endDate)   { btn.textContent = 'Оберіть дату завершення'; btn.disabled = true; return; }

    const s = uaLocalToUTC(startDate, startTime), e = uaLocalToUTC(endDate, endTime);

    if (MODE === 'day' && (startTime < '08:00' || startTime > '20:00')) {
      btn.textContent = '⚠️ Час початку має бути 08:00–20:00'; btn.disabled = true; return;
    }
    if (_startInPast(s)) {
      if (MODE === 'day') {
        btn.textContent = '⚠️ Дата початку в минулому'; btn.disabled = true; return;
      }
      const blocking = BOOKED_BUFFERED.find(b => b.s <= s && b.e > s);
      const minStart = blocking ? new Date(blocking.e) : new Date();
      btn.textContent = `⚠️ Орендувати можна з ${kyivHHMM(minStart)}`; btn.disabled = true; return;
    }
    if (e <= s) {
      btn.textContent = 'Кінець раніше початку ⚠️'; btn.disabled = true; return;
    }
    if (MODE === 'hour' && (e - s) < 3_600_000) {
      btn.textContent = 'Мінімум 1 година ⚠️'; btn.disabled = true; return;
    }
    if (MODE === 'day' && !isBefore(startDate, endDate)) {
      btn.textContent = 'Кінець має бути наступного дня ⚠️'; btn.disabled = true; return;
    }
    if (rangeOverlapsBooking(startDate, startTime, endDate, endTime)) {
      const conflict = BOOKED_BUFFERED.find(b => b.s < e && b.e > s);
      if (conflict) {
        if (conflict.s <= s)   btn.textContent = `⚠️ Початок зайнятий — вільно з ${kyivHHMM(conflict.e)} (${kyivDDMM(conflict.e)})`;
        else if (conflict.e >= e) btn.textContent = `⚠️ Кінець зайнятий — змініть до ${kyivHHMM(conflict.s)} (${kyivDDMM(conflict.s)})`;
        else                   btn.textContent = `⚠️ Бронювання ${kyivHHMM(conflict.s)}–${kyivHHMM(conflict.e)} (${kyivDDMM(conflict.s)}) — змініть кінець`;
      } else {
        btn.textContent = '⚠️ Перетин з бронюванням';
      }
      btn.disabled = true; return;
    }
    btn.textContent = 'Підтвердити →'; btn.disabled = false;
  }

  function submit() {
    if (!isValid()) return;
    const payload = { start_at: dateISO(startDate, startTime), end_at: dateISO(endDate, endTime), unit: MODE, tool_id: TOOL_ID ? parseInt(TOOL_ID) : null };
    if (tg) tg.sendData(JSON.stringify(payload));
    else alert('Payload:\n' + JSON.stringify(payload, null, 2));
  }

  /* ── Init ── */
  goStep('start');
  renderSummary();
  updateBtn();
</script>
</body>
</html>
